<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#2C3E50" />
<title>Carnet MIPC</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
  :root {
    --ink: #20241F;
    --paper: #EDEFE9;
    --card: #F7F8F4;
    --accent: #2C3E50;
    --tension: #8B4A3A;
    --stamp: #3F5B44;
    --border: #CBCEC1;
    --mono: ui-monospace, SFMono-Regular, "Roboto Mono", Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  #root { max-width: 480px; margin: 0 auto; }
  .container { padding: 28px 20px 40px; }
  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .mono { font-family: var(--mono); }
  .muted { color: #8A8D80; }
  .title { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
  .title-sm { font-size: 18px; font-weight: 700; margin: 0 0 16px; }
  .subtitle { color: #5B5F53; font-size: 14px; margin: 0 0 20px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .accent-text { color: var(--accent); }
  .small { font-size: 12px; }
  .uppercase { text-transform: uppercase; letter-spacing: 0.04em; }
  .btn-primary {
    width: 100%; background: var(--accent); color: var(--paper); border: none;
    border-radius: 8px; padding: 15px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: var(--sans);
  }
  .btn-primary:active { opacity: 0.9; }
  .btn-save {
    width: 100%; background: var(--stamp); color: var(--paper); border: none;
    border-radius: 8px; padding: 15px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  .btn-secondary {
    background: transparent; border: 1px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 12px 16px; cursor: pointer; font-family: var(--sans);
  }
  .btn-square { width: 48px; }
  .btn-link { background: none; border: none; color: var(--accent); font-size: 13px; cursor: pointer; font-family: var(--mono); padding: 4px 0; }
  .small-top { margin-top: 6px; margin-bottom: 24px; }
  .flex-1 { flex: 1; }
  .nav-row { display: flex; gap: 8px; margin-top: 18px; }
  .section-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #5B5F53; margin: 0 0 12px; }
  .list { display: flex; flex-direction: column; gap: 8px; }
  .entry-card {
    display: flex; align-items: center; gap: 12px; text-align: left; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; width: 100%;
    font-family: var(--sans); font-size: 14px; color: var(--ink);
  }
  .card-date { width: 78px; flex-shrink: 0; font-size: 12px; }
  .card-preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .center-pad { text-align: center; padding: 40px 0; font-size: 12px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 18px; height: 4px; border-radius: 2px; background: var(--border); }
  .dot-active { background: var(--accent); }
  .icon-btn { background: none; border: none; color: #8A8D80; font-size: 18px; cursor: pointer; }
  .question-text { font-size: 18px; margin: 12px 0 18px; line-height: 1.35; }
  .textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 14px; font-family: var(--sans); color: var(--ink); resize: none;
  }
  .mic-btn {
    margin-top: 12px; width: 100%; background: var(--card); border: 1.5px solid var(--border); color: var(--accent);
    border-radius: 10px; padding: 14px 18px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--sans);
  }
  .mic-active { border-color: var(--stamp); color: var(--stamp); background: #E9EFE9; }
  .error-text { color: var(--tension); font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  .stamp {
    display: inline-block; border: 2px solid var(--stamp); color: var(--stamp); font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.08em; padding: 6px 12px; border-radius: 4px; transform: rotate(-1deg);
    margin-bottom: 18px;
  }
  .recap-card {
    display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; font-family: var(--sans);
  }
  .recap-text { font-size: 14px; margin: 4px 0 0; color: var(--ink); }
  .detail-block { margin-bottom: 16px; }
  .overlay { position: fixed; inset: 0; background: rgba(32,36,31,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .modal { background: var(--paper); width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; border-radius: 12px 12px 0 0; padding: 24px 20px; }
  .banner { border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 16px; font-family: var(--mono); }
  .banner-warn { border: 1px solid var(--tension); color: var(--tension); }
  .banner-ok { border: 2px solid var(--stamp); color: var(--stamp); }
  .label { display: block; font-size: 12px; color: #5B5F53; margin: 14px 0 4px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.04em; }
  .input {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 12px; font-size: 14px; font-family: var(--sans); color: var(--ink);
  }
  .help-box { margin-top: 24px; padding: 14px; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
  .help-title { font-size: 12px; font-weight: 700; margin: 0 0 8px; }
  .help-text { font-size: 12px; color: #5B5F53; margin: 0 0 6px; line-height: 1.4; }
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
